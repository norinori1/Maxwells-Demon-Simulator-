<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maxwell's Demon Simulator</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0C0C18;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        color: #E8ECFF;
        font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        min-height: 100vh;
        padding: 20px;
      }
      .page {
        width: min(760px, 100%);
        text-align: center;
      }
      h1 {
        font-size: clamp(24px, 4vw, 36px);
        letter-spacing: 0.04em;
        margin-bottom: 8px;
      }
      .subtitle {
        color: #AFC7FF;
        font-size: clamp(13px, 2vw, 16px);
        margin-bottom: 18px;
      }
      #game {
        display: block;
        width: 680px;
        height: 420px;
        max-width: 100%;
        margin: 0 auto;
        border: 1px solid #2B3150;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
        touch-action: none;
      }
      canvas { display: block; }
      @media (max-width: 768px) {
        body { padding: 12px; }
        .subtitle { margin-bottom: 12px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>MAXWELL'S DEMON SIMULATOR</h1>
      <p class="subtitle">クリック長押しで穴を開ける ｜ マウスYで穴の位置を調整 ｜ 青を左・赤を右に仕分けよう</p>
      <div id="game"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
