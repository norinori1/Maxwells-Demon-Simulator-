<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maxwell's Demon Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #080D1A;
      background-image:
        linear-gradient(rgba(0, 191, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 191, 255, 0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: #E8ECFF;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      padding: 20px;
    }

    .page {
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: clamp(20px, 3.5vw, 30px);
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      color: #C8D8F0;
    }

    .serial {
      display: inline-block;
      font-size: 11px;
      color: #1E3A5F;
      letter-spacing: 0.12em;
      margin-left: 10px;
      vertical-align: middle;
    }

    .subtitle {
      color: #4A6FA8;
      font-size: clamp(11px, 1.8vw, 13px);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .hint {
      color: #2A4A6A;
      font-size: clamp(10px, 1.5vw, 11px);
      letter-spacing: 0.03em;
      margin-bottom: 14px;
    }

    .panel {
      position: relative;
      display: inline-block;
    }

    .panel::before,
    .panel::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: #1E3A5F;
      border-style: solid;
      z-index: 1;
    }

    .panel::before {
      top: -1px;
      left: -1px;
      border-width: 2px 0 0 2px;
    }

    .panel::after {
      top: -1px;
      right: -1px;
      border-width: 2px 2px 0 0;
    }

    .panel-inner {
      position: relative;
    }

    .panel-inner::before,
    .panel-inner::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: #1E3A5F;
      border-style: solid;
      z-index: 1;
    }

    .panel-inner::before {
      bottom: -1px;
      left: -1px;
      border-width: 0 0 2px 2px;
    }

    .panel-inner::after {
      bottom: -1px;
      right: -1px;
      border-width: 0 2px 2px 0;
    }

    #game {
      display: block;
      width: 680px;
      height: 420px;
      max-width: 100%;
      margin: 0 auto;
      border: 1px solid #1E3A5F;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 229, 204, 0.12), inset 0 0 40px rgba(0, 0, 0, 0.5);
      touch-action: none;
    }

    canvas {
      display: block;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .hint {
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>MAXWELL'S DEMON SIMULATOR<span class="serial">SYS-MXD-001</span></h1>
    <p class="subtitle">THERMODYNAMIC SORTING MACHINE</p>
    <p class="hint">HOLD: Open valve &nbsp;▸&nbsp; RELEASE: Seal &nbsp;▸&nbsp; SORT: COLD→LEFT / HOT→RIGHT</p>
    <div class="panel">
      <div class="panel-inner">
        <div id="game"></div>
      </div>
    </div>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
